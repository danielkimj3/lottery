    <p class="jc-admin-hint">쉼표(,)로 여러 구간을 입력할 수 있습니다. 슬롯은 4자리이므로 번호는 0~9999 범위를 권장합니다.</p>

    <div class="jc-admin-row">
      <label class="jc-admin-label">최대 추첨 개수</label>
      <input type="number" id="jcMaxDrawInput" class="jc-admin-input" min="1" max="9999" placeholder="예) 20 (비워두면 무제한)">
      <button type="button" id="jcSaveMaxDrawBtn" class="jc-admin-btn">한도 저장</button>
    </div>
    <p class="jc-admin-hint">설정한 개수만큼 추첨되면 뽑기 버튼이 더 이상 동작하지 않습니다. 비워두면 무제한으로 추첨됩니다.</p>

    <div class="jc-admin-stats">
      <div class="jc-stat-box">
        <span class="jc-stat-label">전체 번호</span>
        <span class="jc-stat-value" id="jcStatTotal">0</span>
      </div>
      <div class="jc-stat-box">
        <span class="jc-stat-label">남은 번호</span>
        <span class="jc-stat-value" id="jcStatRemain">0</span>
      </div>
      <div class="jc-stat-box">
        <span class="jc-stat-label">추첨된 번호</span>
        <span class="jc-stat-value" id="jcStatDrawn">0</span>
      </div>
      <div class="jc-stat-box">
        <span class="jc-stat-label">추첨 한도</span>
        <span class="jc-stat-value" id="jcStatMaxDraw">무제한</span>
      </div>
    </div>

    <div class="jc-admin-row jc-admin-actions">
      <button type="button" id="jcResetAllBtn" class="jc-admin-btn jc-btn-danger">전체 초기화</button>
      <button type="button" id="jcResetDrawnBtn" class="jc-admin-btn jc-btn-warn">당첨번호 초기화</button>
      <button type="button" id="jcCsvDownloadBtn" class="jc-admin-btn">CSV 다운로드</button>
      <label class="jc-admin-btn jc-file-label">CSV 업로드
        <input type="file" id="jcCsvUploadInput" accept=".csv" style="display:none;">
      </label>
    </div>

    <div class="jc-admin-row">
      <label class="jc-admin-label">추첨된 번호 목록</label>
      <div id="jcAdminDrawnList" class="jc-admin-drawn-list"></div>
    </div>
  </div>

</div>

<style>

<script>
(function(){
  "use strict";

  /* ---------- localStorage 키 ---------- */
  var LS_RANGE = "jc_lottery_range_v1";
  var LS_DRAWN = "jc_lottery_drawn_v1";
  var LS_MAXDRAW = "jc_lottery_maxdraw_v1";
  var DEFAULT_RANGE = "1-70,85-750,752-6500";

  /* ---------- 상태 ---------- */
  var state = {
    range: "",
    drawn: [],
    pool: [],
    maxDraw: null, // null = 무제한
    isSpinning: false
  };

  /* ---------- 유틸: 범위 문자열 파싱 ---------- */
  function parseRanges(rangeStr){
    var result = [];
    var seen = {};
    var parts = String(rangeStr || "").split(",");
    for (var i = 0; i < parts.length; i++){
      var p = parts[i].trim();
      if (!p) continue;
      if (p.indexOf("-") > -1){
        var ab = p.split("-");
        var a = parseInt(ab[0], 10);
        var b = parseInt(ab[1], 10);
        if (isNaN(a) || isNaN(b)) continue;
        var lo = Math.min(a,b), hi = Math.max(a,b);
        for (var n = lo; n <= hi; n++){
          if (!seen[n]){ seen[n] = true; result.push(n); }
        }
      } else {
        var single = parseInt(p, 10);
        if (!isNaN(single) && !seen[single]){ seen[single] = true; result.push(single); }
      }
    }
    return result;
  }

  /* ---------- localStorage 로드/저장 ---------- */
  function loadState(){
    try {
      state.range = localStorage.getItem(LS_RANGE) || DEFAULT_RANGE;
    } catch(e){ state.range = DEFAULT_RANGE; }
    try {
      var d = localStorage.getItem(LS_DRAWN);
      state.drawn = d ? JSON.parse(d) : [];
      if (!Array.isArray(state.drawn)) state.drawn = [];
    } catch(e){ state.drawn = []; }
    try {
      var m = localStorage.getItem(LS_MAXDRAW);
      state.maxDraw = (m === null || m === "") ? null : parseInt(m, 10);
      if (state.maxDraw !== null && (isNaN(state.maxDraw) || state.maxDraw <= 0)) state.maxDraw = null;
    } catch(e){ state.maxDraw = null; }
    recomputePool();
  }

  function saveRange(){
    try { localStorage.setItem(LS_RANGE, state.range); } catch(e){}
  }
  function saveDrawn(){
    try { localStorage.setItem(LS_DRAWN, JSON.stringify(state.drawn)); } catch(e){}
  }
  function saveMaxDraw(){
    try {
      if (state.maxDraw === null) localStorage.setItem(LS_MAXDRAW, "");
      else localStorage.setItem(LS_MAXDRAW, String(state.maxDraw));
    } catch(e){}
  }

  function recomputePool(){
    var full = parseRanges(state.range);
    var drawnSet = {};
    for (var i=0;i<state.drawn.length;i++){ drawnSet[state.drawn[i]] = true; }
    state.pool = full.filter(function(n){ return !drawnSet[n]; });
    state._fullCount = full.length;
  }

  /* ---------- DOM 참조 ---------- */
  var root = document.getElementById("jc-lottery-root");
  var reels = root.querySelectorAll(".jc-reel");
  var drawBtn = document.getElementById("jcDrawBtn");
  var winnerListEl = document.getElementById("jcWinnerList");
  var rangeInput = document.getElementById("jcRangeInput");
  var saveRangeBtn = document.getElementById("jcSaveRangeBtn");
  var statTotal = document.getElementById("jcStatTotal");
  var statRemain = document.getElementById("jcStatRemain");
  var statDrawn = document.getElementById("jcStatDrawn");
  var statMaxDraw = document.getElementById("jcStatMaxDraw");
  var maxDrawInput = document.getElementById("jcMaxDrawInput");
  var saveMaxDrawBtn = document.getElementById("jcSaveMaxDrawBtn");
  var resetAllBtn = document.getElementById("jcResetAllBtn");
  var resetDrawnBtn = document.getElementById("jcResetDrawnBtn");
  var csvDownloadBtn = document.getElementById("jcCsvDownloadBtn");
  var csvUploadInput = document.getElementById("jcCsvUploadInput");
  var adminDrawnList = document.getElementById("jcAdminDrawnList");

  /* ---------- 숫자 포맷 ---------- */
  function pad4(n){
    var s = String(Math.max(0, Math.floor(n)));
    while (s.length < 4) s = "0" + s;
    return s;
  }

  /* ---------- 릴 초기화 (정지 상태 0000) ---------- */
  function setReelStatic(reelEl, digitChar){
    var mask = reelEl.querySelector(".jc-reel-mask");
    var strip = reelEl.querySelector(".jc-reel-strip");
    var h = mask.clientHeight || 1;
    strip.style.transition = "none";
    strip.style.transform = "translateY(0px)";
    strip.innerHTML = "";
    var strokeW = Math.max(1, Math.round(h * 0.022));
    var d = document.createElement("div");
    d.className = "jc-reel-digit";
    d.style.height = h + "px";
    d.style.fontSize = Math.round(h * 0.72) + "px";
    d.style.webkitTextStroke = strokeW + "px #2a1a0a";
    d.style.textStroke = strokeW + "px #2a1a0a";
    d.textContent = digitChar;
    strip.appendChild(d);
  }

  function initReelsStatic(){
    reels.forEach(function(r){ setReelStatic(r, "0"); });
  }

  /* ---------- 릴 스핀 애니메이션 ---------- */
  function spinReel(reelEl, targetDigit, durationMs, onDone){
    var mask = reelEl.querySelector(".jc-reel-mask");
    var strip = reelEl.querySelector(".jc-reel-strip");
    var h = mask.clientHeight || 1;
    var fontSize = Math.round(h * 0.72);
    var strokeW = Math.max(1, Math.round(h * 0.022));
    var digitStyle = 'height:' + h + 'px;font-size:' + fontSize + 'px;-webkit-text-stroke:' + strokeW + 'px #2a1a0a;';
    var count = 26; // 회전 중 보여줄 총 프레임 수 (마지막이 목표 숫자)
    var html = "";
    for (var i = 0; i < count - 1; i++){
      var rnd = Math.floor(Math.random() * 10);
      html += '<div class="jc-reel-digit" style="' + digitStyle + '">' + rnd + '</div>';
    }
    html += '<div class="jc-reel-digit" style="' + digitStyle + '">' + targetDigit + '</div>';

    strip.style.transition = "none";
    strip.style.transform = "translateY(0px)";
    strip.innerHTML = html;
    // 강제 리플로우
    void strip.offsetHeight;

    var distance = h * (count - 1);
    strip.style.transition = "transform " + durationMs + "ms cubic-bezier(0.13,0.62,0.28,1)";

    requestAnimationFrame(function(){
      strip.style.transform = "translateY(-" + distance + "px)";
    });

    var timer = setTimeout(function(){
      // 최종 프레임만 남기고 정리 (다음 정적 상태 대비)
      setReelStatic(reelEl, String(targetDigit));
      if (onDone) onDone();
    }, durationMs + 20);
  }

  /* ---------- 전체 스핀 실행 ---------- */
  function runDraw(numberStr){
    var digits = numberStr.split("");
    var baseSpin = 2000;   // 기본 회전 시간(ms)
    var stagger = 700;     // 순차 정지 간격(ms)
    var decel = 500;       // 감속 여유 시간(ms)
    var maxDelay = 0;
    var doneCount = 0;

    reels.forEach(function(reelEl, idx){
      var duration = baseSpin + idx * stagger + decel;
      maxDelay = Math.max(maxDelay, duration);
      spinReel(reelEl, digits[idx], duration, function(){
        doneCount++;
        if (doneCount === reels.length){
          onAllReelsStopped(numberStr);
        }
      });
    });
  }

  function onAllReelsStopped(numberStr){
    appendWinnerNumber(numberStr);
    state.isSpinning = false;
    drawBtn.disabled = false;
    refreshAdminUI();
  }

  /* ---------- 당첨번호 리스트 렌더링 ---------- */
  function renderWinnerList(){
    winnerListEl.innerHTML = "";
    var rowSize = 4;

    // 2줄이 정확히 보이도록 컨테이너의 실제 픽셀 높이 기준으로 행 높이/폰트 크기 계산
    var containerH = winnerListEl.clientHeight || 60;
    var rowH = Math.max(18, Math.floor(containerH / 2));
    var fontSize = Math.max(12, Math.floor(rowH * 0.88));

    for (var i = 0; i < state.drawn.length; i += rowSize){
      var row = document.createElement("div");
      row.className = "jc-winner-row";
      row.style.height = rowH + "px";
      var chunk = state.drawn.slice(i, i + rowSize);
      chunk.forEach(function(n){
        var span = document.createElement("span");
        span.className = "jc-winner-num";
        span.style.fontSize = fontSize + "px";
        span.textContent = pad4(n);
        row.appendChild(span);
      });
      winnerListEl.appendChild(row);
    }
    // 항상 최신(맨 아래)이 보이도록 스크롤 이동
    winnerListEl.scrollTop = winnerListEl.scrollHeight;
  }

  function appendWinnerNumber(numberStr){
    // numberStr은 이미 4자리 문자열
    renderWinnerList();
  }

  /* ---------- 관리자 화면 갱신 ---------- */
  function refreshAdminUI(){
    recomputePool();
    statTotal.textContent = state._fullCount.toLocaleString();
    statRemain.textContent = state.pool.length.toLocaleString();
    statDrawn.textContent = state.drawn.length.toLocaleString();
    if (state.maxDraw === null){
      statMaxDraw.textContent = "무제한";
    } else {
      var leftByLimit = Math.max(0, state.maxDraw - state.drawn.length);
      statMaxDraw.textContent = state.maxDraw.toLocaleString() + " (잔여 " + leftByLimit.toLocaleString() + ")";
    }
    adminDrawnList.textContent = state.drawn.map(pad4).join(",  ") || "(없음)";
  }

  /* ---------- 뽑기 버튼 클릭 ---------- */
  function handleDrawClick(){
    if (state.isSpinning) return;
    recomputePool();
    if (state.maxDraw !== null && state.drawn.length >= state.maxDraw){
      alert("설정된 최대 추첨 개수(" + state.maxDraw + "개)에 도달했습니다. 관리자 화면에서 한도를 조정하거나 초기화해 주세요.");
      return;
    }
    if (state.pool.length === 0){
      alert("모든 번호가 소진되었습니다. 관리자 화면에서 초기화하거나 범위를 변경해 주세요.");
      return;
    }
    var idx = Math.floor(Math.random() * state.pool.length);
    var picked = state.pool[idx];

    state.drawn.push(picked);
    saveDrawn();

    state.isSpinning = true;
    drawBtn.disabled = true;

    runDraw(pad4(picked));
  }

  /* ---------- 관리자: 범위 저장 ---------- */
  function handleSaveRange(){
    var val = rangeInput.value.trim();
    if (!val){ alert("추첨 범위를 입력해 주세요. 예) 1-70,85-750,752-6500"); return; }
    state.range = val;
    saveRange();
    refreshAdminUI();
    alert("추첨 범위가 저장되었습니다.");
  }

  /* ---------- 관리자: 최대 추첨 개수 저장 ---------- */
  function handleSaveMaxDraw(){
    var raw = maxDrawInput.value.trim();
    if (raw === ""){
      state.maxDraw = null;
    } else {
      var n = parseInt(raw, 10);
      if (isNaN(n) || n <= 0){
        alert("1 이상의 숫자를 입력하거나, 무제한으로 두려면 비워두세요.");
        return;
      }
      state.maxDraw = n;
    }
    saveMaxDraw();
    refreshAdminUI();
    alert(state.maxDraw === null ? "추첨 한도가 무제한으로 설정되었습니다." : "추첨 한도가 " + state.maxDraw + "개로 설정되었습니다.");
  }

  /* ---------- 관리자: 전체 초기화 ---------- */
  function handleResetAll(){
    if (!confirm("범위 설정, 최대 추첨 개수, 추첨된 번호를 모두 초기화합니다. 계속할까요?")) return;
    state.range = DEFAULT_RANGE;
    state.drawn = [];
    state.maxDraw = null;
    saveRange();
    saveDrawn();
    saveMaxDraw();
    rangeInput.value = state.range;
    maxDrawInput.value = "";
    renderWinnerList();
    initReelsStatic();
    refreshAdminUI();
  }

  /* ---------- 관리자: 당첨번호만 초기화 ---------- */
  function handleResetDrawn(){
    if (!confirm("추첨된 번호 목록만 초기화합니다. 계속할까요?")) return;
    state.drawn = [];
    saveDrawn();
    renderWinnerList();
    initReelsStatic();
    refreshAdminUI();
  }

  /* ---------- 관리자: CSV 다운로드 ---------- */
  function handleCsvDownload(){
    var lines = ["번호"];
    state.drawn.forEach(function(n){ lines.push(pad4(n)); });
    var csv = lines.join("\r\n");
    var blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "당첨번호_" + new Date().toISOString().slice(0,10) + ".csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  /* ---------- 관리자: CSV 업로드 ---------- */
  function handleCsvUpload(ev){
    var file = ev.target.files && ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try {
        var text = String(e.target.result || "");
        var rows = text.split(/\r?\n/).map(function(r){ return r.trim(); }).filter(Boolean);
        var nums = [];
        rows.forEach(function(r){
          var v = r.split(",")[0].trim();
          var n = parseInt(v, 10);
          if (!isNaN(n)) nums.push(n);
        });
        // 헤더로 보이는 첫 값(숫자 아님) 자연 제외됨
        if (!confirm("CSV에서 " + nums.length + "개의 번호를 불러왔습니다. 현재 당첨번호 목록을 이 데이터로 교체할까요?")) {
          csvUploadInput.value = "";
          return;
        }
        // 중복 제거
        var uniq = [];
        var seen = {};
        nums.forEach(function(n){ if(!seen[n]){ seen[n]=true; uniq.push(n); } });
        state.drawn = uniq;
        saveDrawn();
        renderWinnerList();
        initReelsStatic();
        refreshAdminUI();
      } catch(err){
        alert("CSV 파일을 읽는 중 오류가 발생했습니다.");
      }
      csvUploadInput.value = "";
    };
    reader.readAsText(file, "UTF-8");
  }

  /* ---------- 리사이즈 대응: 정지 상태 릴 폰트/높이 재계산 ---------- */
  var resizeTimer = null;
  function handleResize(){
    if (state.isSpinning) return; // 스핀 중에는 건드리지 않음
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      reels.forEach(function(r){
        var strip = r.querySelector(".jc-reel-strip");
        var last = strip.querySelector(".jc-reel-digit");
        var digitVal = last ? last.textContent : "0";
        setReelStatic(r, digitVal);
      });
      renderWinnerList();
    }, 120);
  }

  /* ---------- 초기화 ---------- */
  function init(){
    loadState();
    rangeInput.value = state.range;
    maxDrawInput.value = (state.maxDraw === null) ? "" : String(state.maxDraw);
    initReelsStatic();
    renderWinnerList();
    refreshAdminUI();

    drawBtn.addEventListener("click", handleDrawClick);
    saveRangeBtn.addEventListener("click", handleSaveRange);
    saveMaxDrawBtn.addEventListener("click", handleSaveMaxDraw);
    resetAllBtn.addEventListener("click", handleResetAll);
    resetDrawnBtn.addEventListener("click", handleResetDrawn);
    csvDownloadBtn.addEventListener("click", handleCsvDownload);
    csvUploadInput.addEventListener("change", handleCsvUpload);
    window.addEventListener("resize", handleResize);
  }

  if (document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
